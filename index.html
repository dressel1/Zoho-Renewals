:root{--bg:#0b0d11;--sf:#13151c;--sf2:#1a1d27;--bd:#23262f;--tx:#e8e8ed;--tx2:#9194a1;--mt:#555869;--bl:#4e8ef7;--gn:#34d399;--am:#fbbf24;--rd:#f87171;--pr:#a78bfa;--or:#fb923c}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased}
.sh{max-width:1340px;margin:0 auto;padding:28px 24px 60px}
h1{font-size:30px;font-weight:800;letter-spacing:-.03em;display:flex;align-items:center;gap:12px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--gn);box-shadow:0 0 12px var(--gn);display:inline-block;animation:pu 2s infinite}
.sb{color:var(--mt);font-size:13px;margin-top:6px}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}
.qt{display:flex;gap:6px;margin:24px 0}
.qb{padding:10px 26px;border-radius:10px;border:1px solid var(--bd);background:var(--sf);font-family:inherit;font-size:14px;font-weight:600;color:var(--tx2);cursor:pointer}
.qb:hover{border-color:var(--mt)}
.qb.on{background:var(--bl);border-color:var(--bl);color:#fff}
.sts{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:24px}
.st{background:var(--sf);border-radius:12px;padding:16px 18px;border-left:3px solid var(--bd)}
.st .lb{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--mt);margin-bottom:6px}
.st .vl{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700}
.st .hn{font-size:11px;color:var(--mt);margin-top:2px}
.cr{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.tg{display:flex;background:var(--sf);border-radius:8px;overflow:hidden;border:1px solid var(--bd)}
.tg button{padding:8px 18px;border:none;font-family:inherit;font-size:13px;font-weight:500;background:transparent;color:var(--mt);cursor:pointer}
.tg button.on{background:var(--sf2);color:var(--tx)}
select.cl{padding:8px 14px;border-radius:8px;border:1px solid var(--bd);background:var(--sf);color:var(--tx2);font-family:inherit;font-size:13px;cursor:pointer}
.cn{font-size:12px;color:var(--mt);margin-left:8px;font-family:'JetBrains Mono',monospace}
.tw{background:var(--sf);border-radius:12px;border:1px solid var(--bd);overflow:hidden}
.ts{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:12px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--mt);border-bottom:1px solid var(--bd);white-space:nowrap;background:var(--sf)}
tbody tr{border-bottom:1px solid var(--bg)}
tbody tr:hover{background:var(--sf2)}
td{padding:10px 14px;white-space:nowrap}
.up{display:inline-block;padding:3px 10px;border-radius:20px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600}
.ac{font-weight:600;max-width:220px;overflow:hidden;text-overflow:ellipsis}
.dn{color:var(--tx2);max-width:280px;overflow:hidden;text-overflow:ellipsis;font-size:12px}
.vc{font-family:'JetBrains Mono',monospace;font-weight:600}
.om{color:var(--or);font-size:11px;font-weight:700}
.tg2{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;margin-right:4px}
.ft{margin-top:14px;padding:12px 16px;background:var(--sf);border-radius:10px;display:flex;justify-content:space-between;font-size:12px;color:var(--mt);flex-wrap:wrap;gap:8px}
</style>
</head>

  h+='<div class="qt">';
  h+='<button class="qb'+(state.quarter===2?" on":"")+'" onclick="setQ(2)">Q2 2026 <span style="font-size:11px;opacity:.6;margin-left:6px">Apr–Jun</span></button>';
  h+='<button class="qb'+(state.quarter===3?" on":"")+'" onclick="setQ(3)">Q3 2026 <span style="font-size:11px;opacity:.6;margin-left:6px">Jul–Sep</span></button>';
  h+='</div>';
 
  // Stats
  var cards=[
    {l:"Won Deals",v:won.length,n:"contracts expiring",c:"var(--bl)"},
    {l:"Total Value",v:"$"+(tv/1e6).toFixed(1)+"M",n:"mixed currencies",c:"var(--gn)"},
    {l:"Auto-Renew",v:ac,n:"will auto-roll",c:"var(--pr)"},
    {l:"Pipeline",v:pipe.length,n:"still in progress",c:"var(--am)"},
    {l:"Urgent",v:uc2,n:"≤ 14 days left",c:"var(--rd)"},
    {l:"No Owner",v:no,n:"needs assignment",c:"var(--or)"}
  ];
  h+='<div class="sts">';
  cards.forEach(function(cd){
    h+='<div class="st" style="border-left-color:'+cd.c+'">';
    h+='<div class="lb">'+cd.l+'</div>';
    h+='<div class="vl" style="color:'+cd.c+'">'+cd.v+'</div>';
    h+='<div class="hn">'+cd.n+'</div></div>';
  });
  h+='</div>';
 
  // Controls
  h+='<div class="cr">';
  h+='<div class="tg">';
  h+='<button class="'+(state.view==="won"?"on":"")+'" onclick="setV(\'won\')">Closed Won</button>';
  h+='<button class="'+(state.view==="pipeline"?"on":"")+'" onclick="setV(\'pipeline\')">Pipeline</button>';
  h+='</div>';
  h+='<select class="cl" onchange="setSt(this.value)">';
  h+='<option value="date"'+(state.sort==="date"?" selected":"")+'>Sort: End Date</option>';
  h+='<option value="value"'+(state.sort==="value"?" selected":"")+'>Sort: Value</option>';
  h+='<option value="owner"'+(state.sort==="owner"?" selected":"")+'>Sort: Owner</option>';
  h+='</select>';
  h+='<select class="cl" onchange="setO(this.value)">';
  h+='<option value="all"'+(state.owner==="all"?" selected":"")+'>All Owners</option>';
  ownerList.forEach(function(o){h+='<option value="'+o+'"'+(state.owner===o?" selected":"")+'>'+o+'</option>'});
  h+='</select>';
  h+='<span class="cn">'+list.length+' deals</span>';
  h+='</div>';
 
  // Table
  h+='<div class="tw"><div class="ts"><table>';
  h+='<thead><tr><th>Urgency</th><th>End Date</th><th>Account</th><th>Deal</th><th>Value</th><th>Owner</th><th>Flags</th></tr></thead>';
  h+='<tbody>';
  if(!list.length) h+='<tr><td colspan="7" style="padding:40px;text-align:center;color:var(--mt)">No deals match filters</td></tr>';
  list.forEach(function(x){
    var clr=uc(x.e);
    var vc2=x.v>100000?"var(--gn)":x.v>0?"var(--tx2)":"var(--mt)";
    h+='<tr>';
    h+='<td><span class="up" style="background:'+clr+'18;color:'+clr+'">'+ul(x.e)+'</span></td>';
    h+='<td style="font-family:JetBrains Mono,monospace;font-size:12px;color:var(--tx2)">'+x.e+'</td>';
    h+='<td class="ac">'+x.a+'</td>';
    h+='<td class="dn">'+x.d+'</td>';
    h+='<td class="vc" style="color:'+vc2+'">'+fm(x.v,x.c)+'</td>';
    h+='<td>'+(x.o?'<span style="color:var(--tx2)">'+x.o+'</span>':'<span class="om">⚠ UNASSIGNED</span>')+'</td>';
    h+='<td>';
    if(x.r) h+='<span class="tg2" style="background:rgba(167,139,250,.12);color:var(--pr)">AUTO</span>';
    if(state.view==="pipeline") h+='<span class="tg2" style="background:rgba(251,191,36,.1);color:var(--am)">'+x.s+'</span>';
    x.f.forEach(function(t){h+='<span class="tg2" style="background:rgba(78,142,247,.1);color:var(--bl)">'+t+'</span>'});
    h+='</td></tr>';
  });
  h+='</tbody></table></div></div>';
 
  h+='<div class="ft"><span>Zoho CRM Deals module — Contract_End_Date field</span><span>Values in original currency — not normalised to USD</span></div>';
  h+='</div>';
 
  document.getElementById("root").innerHTML=h;
}
 
function setQ(n){state.quarter=n;state.owner="all";render()}
function setV(v){state.view=v;state.owner="all";render()}
function setSt(v){state.sort=v;render()}
function setO(v){state.owner=v;render()}
 
render();
</script>
</body>
</html>
